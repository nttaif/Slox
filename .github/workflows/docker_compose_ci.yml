name: Slox API CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SETUP ENV
      - name: Create env file
        run: echo "${{ secrets.ENV_TEST_FILE }}" > .env

      # 2. CACHING
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 3. BUILD
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker images
        run: docker compose -f docker-compose.test.yml build

      # 4. START SERVICES
      - name: Start services and wait for health
        run: docker compose -f docker-compose.test.yml up -d --wait

      # 5. MIGRATE
      - name: Run database migrations
        run: docker exec slox_api_test npx prisma migrate deploy

      # 6. TEST
      - name: Run tests
        run: docker exec -t slox_api_test npm run test

      # 7. E2E TEST
      - name: Run E2E tests
        run: docker exec -t slox_api_test npm run test:e2e

      # 8. DEBUGGING
      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      # 9. CLEANUP
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.test.yml down --rmi local -v --remove-orphans